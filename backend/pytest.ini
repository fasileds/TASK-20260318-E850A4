[pytest]
addopts = -q -p no:pytest_asyncio
markers =
    req1_validation: applicant material type/size validation
    req1_versioning: material max-3 version behavior
    req1_window: supplement 72-hour window behavior
    req1_locks: post-deadline material lock behavior
    req2_state_machine: reviewer state machine transitions
    req2_batch_50: reviewer batch update size 50
    req3_overspending: overspending warning behavior
    req3_reports: report export structure
    req4_lockout: login lockout controls
    req4_masking: sensitive field masking
    req4_fingerprint: duplicate SHA-256 detector
    req5_metrics: quality metrics calculations
